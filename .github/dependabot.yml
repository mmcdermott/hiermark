version: 2
updates:
  - package-ecosystem: npm
    directory: "/"
    schedule:
      # Monthly (was weekly) to cut PR/alert noise. Security alerts still fire
      # immediately regardless of this cadence — this only throttles the
      # routine version-update PRs.
      interval: monthly
    open-pull-requests-limit: 5
    groups:
      # Tiptap ships its many packages in lockstep; keep them in one PR.
      tiptap:
        patterns:
          - "@tiptap/*"
      # Batch all remaining non-major prod bumps into a single monthly PR.
      production-minor-patch:
        dependency-type: production
        update-types:
          - minor
          - patch
      # Dev-dependency minor/patch bumps into one PR. Majors are deliberately
      # excluded so breaking tooling upgrades (e.g. ESLint 9→10) arrive as their
      # own PRs to be migrated on purpose, instead of poisoning the batch.
      dev-minor-patch:
        dependency-type: development
        update-types:
          - minor
          - patch
    # Major bumps (prod or dev) fall outside every group above, so they still
    # arrive as individual PRs and get reviewed one at a time.
    ignore:
      # tsup's dts build injects `baseUrl` internally, which TypeScript 6
      # hard-errors on (TS5101) — unblock when tsup ships TS 6 support.
      - dependency-name: "typescript"
        versions: [">=6.0.0"]
      # @tiptap/extension-mathematics peers `katex ^0.16.4`; 0.17 violates it.
      - dependency-name: "katex"
        versions: [">=0.17.0"]
      # Pin the lint/types tooling to its current major until a deliberate
      # migration (ESLint 10 + react-hooks 7 are breaking; @types/node should
      # track the Node 22 runtime, not jump to 25). These came in as the
      # lint-failing batch PR #68 — re-take them on purpose, not via dependabot.
      - dependency-name: "eslint"
        versions: [">=10.0.0"]
      - dependency-name: "@eslint/js"
        versions: [">=10.0.0"]
      - dependency-name: "eslint-plugin-react-hooks"
        versions: [">=6.0.0"]
      - dependency-name: "@types/node"
        versions: [">=23.0.0"]
      - dependency-name: "globals"
        versions: [">=17.0.0"]
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: monthly
    open-pull-requests-limit: 5
    groups:
      github-actions:
        patterns:
          - "*"
