name: Release

on:
  push:
    branches: [main]

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      # Gate releases on the build + test suite: a broken main can still open a
      # Version Packages PR, but it can never tag a release.
      - name: Build packages
        run: pnpm build
      - name: Test
        run: pnpm test
      - name: Create release PR or tag release
        uses: changesets/action@v1
        with:
          # `pnpm run` is required — bare `pnpm version` is an npm passthrough
          # that prints the version table and never executes the script.
          version: pnpm run version-packages
          # Tag-only releases: `changeset tag` prints "New tag: …" lines that
          # the action turns into git tags + GitHub Releases (changelog bodies).
          # To publish to npm later: claim the scope, add an NPM_TOKEN secret,
          # restore setup-node's registry-url + NODE_AUTH_TOKEN, and switch
          # this to `publish: pnpm release`.
          publish: pnpm changeset tag
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
