name: Release

on:
  push:
    branches: [main]

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write
  # Required for npm provenance (publishConfig.provenance: true) via OIDC.
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "pnpm"
          registry-url: "https://registry.npmjs.org"
      - run: pnpm install --frozen-lockfile
      # Gate releases on the build + test suite: a broken main can still open a
      # Version Packages PR, but it can never tag a release.
      - name: Build packages
        run: pnpm build
      - name: Test
        run: pnpm test
      - name: Create release PR or tag release
        uses: changesets/action@v1
        with:
          # `pnpm run` is required — bare `pnpm version` is an npm passthrough
          # that prints the version table and never executes the script.
          version: pnpm run version-packages
          # When a Version Packages PR merges, `pnpm release` builds and runs
          # `changeset publish`, which publishes every package whose version is
          # not yet on npm and creates the matching git tags + GitHub Releases.
          # Already-published versions are skipped, so re-runs are safe.
          # Prerequisites (one-time): create the npm org `hiermark`, mint a
          # granular automation token, and add it as the NPM_TOKEN repo secret.
          publish: pnpm release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
