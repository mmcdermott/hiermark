name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        node: ["22", "24"]
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - name: Build packages
        run: pnpm build
      - name: Format check
        run: pnpm format:check
      - name: Typecheck
        run: pnpm typecheck
      - name: Lint
        run: pnpm lint
      - name: Test
        run: pnpm test
      - name: Coverage (thresholds)
        run: pnpm -r --filter "./packages/*" exec vitest run --coverage
      - name: Generate API reference (TypeDoc)
        run: pnpm docs:api
      - name: Docs build
        run: pnpm -F @ham/docs build
      - name: Packaging check (publint)
        run: pnpm -r --filter "./packages/*" exec publint --strict
      - name: Bundle size budgets (size-limit)
        run: pnpm size

  # Guards the widened `^18.3.0 || ^19` peer range: build + run both packages'
  # suites with React 18 actually installed (overrides pin the whole tree).
  react18:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "pnpm"
      - name: Pin React 18 via pnpm overrides
        run: |
          npm pkg set 'pnpm.overrides.react=18.3.1' 'pnpm.overrides.react-dom=18.3.1' 'pnpm.overrides.@types/react=^18' 'pnpm.overrides.@types/react-dom=^18'
          pnpm install --no-frozen-lockfile
      - name: Build packages (React 18)
        run: pnpm build
      - name: Test (React 18)
        run: pnpm test
